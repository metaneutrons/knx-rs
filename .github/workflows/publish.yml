name: Publish

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace -- --test-threads=1
      - run: cargo clippy --workspace -- -D warnings
      - run: cargo check -p knx-rs-core --no-default-features
      - run: cargo check -p knx-rs-device --no-default-features
      - run: cargo check -p knx-rs-tp --no-default-features

  publish:
    name: Publish to crates.io
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Check for CARGO_REGISTRY_TOKEN
        id: check_token
        run: |
          if [[ -n "${{ secrets.CARGO_REGISTRY_TOKEN }}" ]]; then
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_token=false" >> "$GITHUB_OUTPUT"
            echo "::warning::CARGO_REGISTRY_TOKEN not set — skipping crates.io publish"
          fi
      # Publish in dependency order: knx-rs-core first, then dependents
      - name: Publish knx-rs-core
        if: steps.check_token.outputs.has_token == 'true'
        run: cargo publish -p knx-rs-core --token ${{ secrets.CARGO_REGISTRY_TOKEN }} || echo "::warning::knx-rs-core already published or failed"
      - name: Wait for crates.io index
        if: steps.check_token.outputs.has_token == 'true'
        run: sleep 30
      - name: Publish knx-rs-ip
        if: steps.check_token.outputs.has_token == 'true'
        run: cargo publish -p knx-rs-ip --token ${{ secrets.CARGO_REGISTRY_TOKEN }} || echo "::warning::knx-rs-ip already published or failed"
      - name: Publish knx-rs-device
        if: steps.check_token.outputs.has_token == 'true'
        run: cargo publish -p knx-rs-device --token ${{ secrets.CARGO_REGISTRY_TOKEN }} || echo "::warning::knx-rs-device already published or failed"
      - name: Publish knx-rs-tp
        if: steps.check_token.outputs.has_token == 'true'
        run: cargo publish -p knx-rs-tp --token ${{ secrets.CARGO_REGISTRY_TOKEN }} || echo "::warning::knx-rs-tp already published or failed"
      - name: Publish knx-rs-prod
        if: steps.check_token.outputs.has_token == 'true'
        run: cargo publish -p knx-rs-prod --token ${{ secrets.CARGO_REGISTRY_TOKEN }} || echo "::warning::knx-rs-prod already published or failed"
