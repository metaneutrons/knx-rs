name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          manifest-file: .release-please-manifest.json
          config-file: release-please-config.json

      - name: Trigger publish
        if: steps.release.outputs.releases_created == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run publish.yml \
            --repo ${{ github.repository }} \
            -f knx_core_release="${{ steps.release.outputs['knx-core--release_created'] || 'false' }}" \
            -f knx_ip_release="${{ steps.release.outputs['knx-ip--release_created'] || 'false' }}" \
            -f knx_device_release="${{ steps.release.outputs['knx-device--release_created'] || 'false' }}" \
            -f knx_tp_release="${{ steps.release.outputs['knx-tp--release_created'] || 'false' }}" \
            -f knx_prod_release="${{ steps.release.outputs['knx-prod--release_created'] || 'false' }}"
